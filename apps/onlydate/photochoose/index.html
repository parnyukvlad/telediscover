<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Admin · OnlyDate</title>
  <style>
    :root {
      --bg:        #0a0a0a;
      --surface:   #141414;
      --surface2:  #1e1e1e;
      --surface3:  #282828;
      --accent:    #a855f7;
      --green:     #22c55e;
      --red:       #ef4444;
      --gold:      #f59e0b;
      --text:      #ffffff;
      --muted:     #888888;
      --font:      -apple-system, "SF Pro Display", system-ui, sans-serif;
      --radius:    12px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }
    img { display: block; }
    button { font-family: var(--font); cursor: pointer; }

    /* ── Lock screen ─────────────────────────────── */
    #lock {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lock-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .lock-icon  { font-size: 40px; margin-bottom: 18px; }
    .lock-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .lock-sub   { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .lock-input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: var(--font);
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.18s;
    }
    .lock-input:focus { border-color: var(--accent); }
    .lock-input.shake {
      animation: shake 0.35s ease;
      border-color: var(--red);
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-6px); }
      80%      { transform: translateX(6px); }
    }
    .lock-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      transition: opacity 0.14s;
    }
    .lock-btn:active { opacity: 0.8; }

    /* ── App shell ───────────────────────────────── */
    #app { display: none; min-height: 100vh; }

    /* ── Header ──────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-back {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--surface2);
      color: var(--text);
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .topbar-back:active { background: var(--surface3); }
    .topbar-back.hidden { visibility: hidden; pointer-events: none; }
    .topbar-title {
      flex: 1;
      font-size: 17px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar-logout {
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .topbar-logout:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

    /* ── Personas list ───────────────────────────── */
    #personas-view { display: block; }
    .search-wrap {
      padding: 14px 16px 8px;
    }
    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.18s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .persona-list { padding: 4px 0 40px; }
    .persona-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.14s;
      -webkit-user-select: none;
      user-select: none;
    }
    .persona-row:active { background: var(--surface); }
    .persona-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.08);
    }
    .persona-info { flex: 1; overflow: hidden; }
    .persona-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .persona-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }
    .persona-arrow { color: var(--muted); font-size: 16px; }

    /* ── Photos view ─────────────────────────────── */
    #photos-view { display: none; }
    .photos-grid-admin {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 12px 10px 60px;
    }
    @media (min-width: 600px) {
      .photos-grid-admin { grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 16px 16px 60px; }
    }

    /* ── Photo card ──────────────────────────────── */
    .photo-card {
      position: relative;
      aspect-ratio: 3 / 4;
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface2);
    }
    .photo-card img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    /* hidden overlay */
    .photo-card.hidden-photo img { opacity: 0.22; }
    .photo-card.hidden-photo .photo-overlay { opacity: 1; }
    .photo-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .photo-overlay-text {
      font-size: 11px;
      font-weight: 700;
      color: var(--red);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    /* cover badge */
    .photo-card.is-cover::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 2.5px solid var(--gold);
      border-radius: 10px;
      pointer-events: none;
    }
    .cover-badge {
      position: absolute;
      top: 5px;
      left: 5px;
      background: var(--gold);
      color: #000;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      display: none;
    }
    .photo-card.is-cover .cover-badge { display: block; }

    /* ── Action buttons on photo ─────────────────── */
    .photo-actions {
      position: absolute;
      bottom: 5px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 6px;
    }
    .photo-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      line-height: 1;
      transition: transform 0.12s, opacity 0.12s;
      flex-shrink: 0;
    }
    .photo-btn:active { transform: scale(0.88); }
    .btn-eye  { background: rgba(34,197,94,0.85);  color: #fff; }
    .btn-eye.hidden-state { background: rgba(239,68,68,0.85); }
    .btn-star { background: rgba(30,30,30,0.85); color: rgba(255,255,255,0.5); }
    .btn-star.cover-state  { background: rgba(245,158,11,0.9); color: #fff; }

    /* ── Loading spinner ─────────────────────────── */
    .spinner-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 80px 20px;
      gap: 6px;
    }
    .sp-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: spPulse 1.2s ease-in-out infinite;
    }
    .sp-dot:nth-child(2) { animation-delay: 0.2s; }
    .sp-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes spPulse {
      0%,80%,100% { opacity: 0.25; transform: scale(0.75); }
      40%          { opacity: 1;    transform: scale(1.15); }
    }

    /* ── Toast ───────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      color: var(--text);
      padding: 9px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.09);
      white-space: nowrap;
      z-index: 9999;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Empty state ─────────────────────────────── */
    .empty { text-align: center; padding: 64px 20px; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<!-- ═══ LOCK SCREEN ════════════════════════════════ -->
<div id="lock">
  <div class="lock-card">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">Photo Admin</div>
    <div class="lock-sub">Enter admin password to continue</div>
    <input
      id="pw-input"
      class="lock-input"
      type="password"
      placeholder="Password"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="lock-btn" id="pw-btn">Unlock</button>
  </div>
</div>

<!-- ═══ APP ════════════════════════════════════════ -->
<div id="app">

  <!-- Top bar -->
  <div class="topbar">
    <button class="topbar-back hidden" id="back-btn" aria-label="Back">←</button>
    <div class="topbar-title" id="topbar-title">📸 Photo Admin</div>
    <button class="topbar-logout" id="logout-btn">Logout</button>
  </div>

  <!-- Personas list -->
  <div id="personas-view">
    <div class="search-wrap">
      <input class="search-input" id="search-input" type="search" placeholder="🔍  Search personas…" />
    </div>
    <div class="persona-list" id="persona-list">
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- Photos for selected persona -->
  <div id="photos-view">
    <div class="photos-grid-admin" id="photos-grid">
      <!-- rendered by JS -->
    </div>
  </div>

</div>

<!-- ═══ TOAST ══════════════════════════════════════ -->
<div id="toast"></div>

<script>
'use strict';

const API_BASE = 'https://onlydate-api.tg-saas.workers.dev';
const SESSION_KEY = 'od_admin_pw';

/* ── DOM refs ─────────────────────────────────── */
const $lock         = document.getElementById('lock');
const $app          = document.getElementById('app');
const $pwInput      = document.getElementById('pw-input');
const $pwBtn        = document.getElementById('pw-btn');
const $logoutBtn    = document.getElementById('logout-btn');
const $backBtn      = document.getElementById('back-btn');
const $topbarTitle  = document.getElementById('topbar-title');
const $personasView = document.getElementById('personas-view');
const $photosView   = document.getElementById('photos-view');
const $personaList  = document.getElementById('persona-list');
const $photosGrid   = document.getElementById('photos-grid');
const $searchInput  = document.getElementById('search-input');
const $toast        = document.getElementById('toast');

/* ── State ────────────────────────────────────── */
let password      = '';
let allPersonas   = [];
let currentPersId = null;
let toastTimer    = null;

/* ── Boot ─────────────────────────────────────── */
const saved = sessionStorage.getItem(SESSION_KEY);
if (saved) { password = saved; showApp(); }

/* ── Password gate ────────────────────────────── */
$pwBtn.addEventListener('click', attemptUnlock);
$pwInput.addEventListener('keydown', function (e) {
  if (e.key === 'Enter') attemptUnlock();
});

async function attemptUnlock() {
  const pw = $pwInput.value.trim();
  if (!pw) return;
  // Test against a lightweight endpoint
  try {
    const res = await fetch(API_BASE + '/api/onlydate/admin/personas', {
      headers: { 'X-Admin-Password': pw }
    });
    if (res.status === 401) {
      $pwInput.classList.add('shake');
      setTimeout(() => $pwInput.classList.remove('shake'), 400);
      showToast('Wrong password');
      return;
    }
    const data = await res.json();
    password = pw;
    sessionStorage.setItem(SESSION_KEY, pw);
    allPersonas = data.personas || [];
    showApp();
    renderPersonaList(allPersonas);
  } catch (e) {
    showToast('Connection error');
  }
}

function showApp() {
  $lock.style.display = 'none';
  $app.style.display = 'block';
  if (allPersonas.length === 0) loadPersonas();
}

/* ── Load personas ────────────────────────────── */
async function loadPersonas() {
  $personaList.innerHTML = spinner();
  try {
    const res  = await fetch(API_BASE + '/api/onlydate/admin/personas', {
      headers: { 'X-Admin-Password': password }
    });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    allPersonas = data.personas || [];
    renderPersonaList(allPersonas);
  } catch (e) {
    $personaList.innerHTML = '<div class="empty">Failed to load. Check connection.</div>';
  }
}

/* ── Render personas list ─────────────────────── */
function renderPersonaList(personas) {
  if (personas.length === 0) {
    $personaList.innerHTML = '<div class="empty">No personas found.</div>';
    return;
  }
  $personaList.innerHTML = personas.map(function (p) {
    // First visible photo as avatar, else first photo
    const firstVisible = p.photos.find(function (ph) { return !ph.is_hidden; });
    const firstPhoto   = p.photos[0];
    const avatar       = (firstVisible || firstPhoto || {}).file_url || '';
    const visCount     = p.photos.filter(function (ph) { return !ph.is_hidden; }).length;
    const handle       = (p.username || '').replace(/^@/, '');
    return (
      '<div class="persona-row" data-persona-id="' + escHtml(p.id) + '">' +
        '<img class="persona-avatar" src="' + escHtml(avatar) + '" alt="" ' +
            'onerror="this.style.opacity=\'0\'">' +
        '<div class="persona-info">' +
          '<div class="persona-name">' + escHtml(p.name) + '</div>' +
          '<div class="persona-meta">@' + escHtml(handle) + ' · ' +
            visCount + ' visible / ' + p.photos.length + ' total</div>' +
        '</div>' +
        '<div class="persona-arrow">›</div>' +
      '</div>'
    );
  }).join('');
}

/* ── Search ───────────────────────────────────── */
$searchInput.addEventListener('input', function () {
  const q = this.value.trim().toLowerCase();
  const filtered = q
    ? allPersonas.filter(function (p) {
        return p.name.toLowerCase().includes(q) ||
               (p.username || '').toLowerCase().includes(q);
      })
    : allPersonas;
  renderPersonaList(filtered);
});

/* ── Persona click → photos view ──────────────── */
$personaList.addEventListener('click', function (e) {
  var row = e.target.closest('.persona-row');
  if (!row) return;
  openPersonaPhotos(row.dataset.personaId);
});

function openPersonaPhotos(personaId) {
  const persona = allPersonas.find(function (p) { return p.id === personaId; });
  if (!persona) return;
  currentPersId = personaId;

  $personasView.style.display = 'none';
  $photosView.style.display   = 'block';
  $backBtn.classList.remove('hidden');
  $topbarTitle.textContent    = persona.name;

  renderPhotoGrid(persona);
}

/* ── Back ─────────────────────────────────────── */
$backBtn.addEventListener('click', showPersonasView);
function showPersonasView() {
  $photosView.style.display   = 'none';
  $personasView.style.display = 'block';
  $backBtn.classList.add('hidden');
  $topbarTitle.textContent    = '📸 Photo Admin';
  currentPersId = null;
  // Refresh persona list meta (visible counts may have changed)
  renderPersonaList(
    $searchInput.value.trim()
      ? allPersonas.filter(function (p) {
          var q = $searchInput.value.trim().toLowerCase();
          return p.name.toLowerCase().includes(q) ||
                 (p.username || '').toLowerCase().includes(q);
        })
      : allPersonas
  );
}

/* ── Render photo grid ────────────────────────── */
function renderPhotoGrid(persona) {
  if (persona.photos.length === 0) {
    $photosGrid.innerHTML = '<div class="empty" style="grid-column:1/-1">No photos.</div>';
    return;
  }
  $photosGrid.innerHTML = persona.photos.map(function (ph) {
    var hiddenClass  = ph.is_hidden ? ' hidden-photo' : '';
    var coverClass   = ph.is_cover  ? ' is-cover'     : '';
    var eyeState     = ph.is_hidden ? ' hidden-state'  : '';
    var eyeIcon      = ph.is_hidden ? '🚫'             : '👁';
    var starState    = ph.is_cover  ? ' cover-state'   : '';
    var starIcon     = ph.is_cover  ? '⭐'             : '☆';
    return (
      '<div class="photo-card' + hiddenClass + coverClass + '" data-media-id="' + escHtml(ph.media_id) + '">' +
        '<img src="' + escHtml(ph.file_url) + '" loading="lazy" alt="">' +
        '<div class="photo-overlay"><span class="photo-overlay-text">Hidden</span></div>' +
        '<div class="cover-badge">Cover</div>' +
        '<div class="photo-actions">' +
          '<button class="photo-btn btn-eye' + eyeState + '" data-action="toggle" title="Toggle visibility">' + eyeIcon + '</button>' +
          '<button class="photo-btn btn-star' + starState + '" data-action="cover" title="Set as cover">' + starIcon + '</button>' +
        '</div>' +
      '</div>'
    );
  }).join('');
}

/* ── Photo action clicks ──────────────────────── */
$photosGrid.addEventListener('click', async function (e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var card    = btn.closest('.photo-card');
  var mediaId = card.dataset.mediaId;
  var persona = allPersonas.find(function (p) { return p.id === currentPersId; });
  if (!persona) return;
  var photo   = persona.photos.find(function (ph) { return ph.media_id === mediaId; });
  if (!photo) return;

  var action = btn.dataset.action;

  if (action === 'toggle') {
    btn.disabled = true;
    try {
      const newHidden = !photo.is_hidden;
      const res = await fetch(API_BASE + '/api/onlydate/admin/photo/toggle', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': password },
        body:    JSON.stringify({ media_id: mediaId, is_hidden: newHidden }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      photo.is_hidden = newHidden;
      // Update card
      card.classList.toggle('hidden-photo', newHidden);
      btn.classList.toggle('hidden-state', newHidden);
      btn.textContent = newHidden ? '🚫' : '👁';
      showToast(newHidden ? 'Photo hidden' : 'Photo visible');
    } catch {
      showToast('Error — try again');
    } finally {
      btn.disabled = false;
    }
  }

  if (action === 'cover') {
    if (photo.is_cover) return; // already cover
    btn.disabled = true;
    try {
      const res = await fetch(API_BASE + '/api/onlydate/admin/photo/cover', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': password },
        body:    JSON.stringify({ media_id: mediaId, persona_id: persona.id }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      // Update state
      persona.photos.forEach(function (ph) { ph.is_cover = false; });
      photo.is_cover = true;
      // Re-render grid to reflect new cover
      renderPhotoGrid(persona);
      showToast('Cover photo set ⭐');
    } catch {
      showToast('Error — try again');
    } finally {
      btn.disabled = false;
    }
  }
});

/* ── Logout ───────────────────────────────────── */
$logoutBtn.addEventListener('click', doLogout);
function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  password    = '';
  allPersonas = [];
  $app.style.display  = 'none';
  $lock.style.display = 'flex';
  $pwInput.value      = '';
  showPersonasView();
}

/* ── Helpers ──────────────────────────────────── */
function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { $toast.classList.remove('show'); }, 2200);
}

function spinner() {
  return '<div class="spinner-wrap">' +
    '<div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div>' +
    '</div>';
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#039;');
}
</script>
</body>
</html>
