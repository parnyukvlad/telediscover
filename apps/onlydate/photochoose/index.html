<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Admin · OnlyDate</title>
  <style>
    :root {
      --bg:        #0a0a0a;
      --surface:   #141414;
      --surface2:  #1e1e1e;
      --surface3:  #282828;
      --accent:    #a855f7;
      --green:     #22c55e;
      --red:       #ef4444;
      --gold:      #f59e0b;
      --text:      #ffffff;
      --muted:     #888888;
      --font:      -apple-system, "SF Pro Display", system-ui, sans-serif;
      --radius:    12px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }
    img { display: block; }
    button { font-family: var(--font); cursor: pointer; }

    /* ── Lock screen ─────────────────────────────── */
    #lock {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lock-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .lock-icon  { font-size: 40px; margin-bottom: 18px; }
    .lock-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .lock-sub   { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .lock-input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: var(--font);
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.18s;
    }
    .lock-input:focus { border-color: var(--accent); }
    .lock-input.shake {
      animation: shake 0.35s ease;
      border-color: var(--red);
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-6px); }
      80%      { transform: translateX(6px); }
    }
    .lock-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      transition: opacity 0.14s;
    }
    .lock-btn:active { opacity: 0.8; }

    /* ── App shell ───────────────────────────────── */
    #app { display: none; min-height: 100vh; }

    /* ── Header ──────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-back {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--surface2);
      color: var(--text);
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .topbar-back:active { background: var(--surface3); }
    .topbar-back.hidden { visibility: hidden; pointer-events: none; }
    .topbar-title {
      flex: 1;
      font-size: 17px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar-logout {
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .topbar-logout:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

    /* ── Personas list ───────────────────────────── */
    #personas-view { display: block; }
    .search-wrap {
      padding: 14px 16px 8px;
    }
    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.18s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .persona-list { padding: 4px 0 40px; }
    .persona-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.14s;
      -webkit-user-select: none;
      user-select: none;
    }
    .persona-row:active { background: var(--surface); }
    .persona-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.08);
    }
    .persona-info { flex: 1; overflow: hidden; }
    .persona-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .persona-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }
    .persona-arrow { color: var(--muted); font-size: 16px; }

    /* ── Photos view ─────────────────────────────── */
    #photos-view { display: none; }
    .photos-grid-admin {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 12px 10px 60px;
    }
    @media (min-width: 600px) {
      .photos-grid-admin { grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 16px 16px 60px; }
    }

    /* ── Photo card ──────────────────────────────── */
    .photo-card {
      position: relative;
      aspect-ratio: 3 / 4;
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface2);
    }
    .photo-card img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    /* hidden overlay */
    .photo-card.hidden-photo img { opacity: 0.22; }
    .photo-card.hidden-photo .photo-overlay { opacity: 1; }
    .photo-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .photo-overlay-text {
      font-size: 11px;
      font-weight: 700;
      color: var(--red);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    /* cover badge */
    .photo-card.is-cover::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 2.5px solid var(--gold);
      border-radius: 10px;
      pointer-events: none;
    }
    .cover-badge {
      position: absolute;
      top: 5px;
      left: 5px;
      background: var(--gold);
      color: #000;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      display: none;
    }
    .photo-card.is-cover .cover-badge { display: block; }

    /* ── Action buttons on photo ─────────────────── */
    .photo-actions {
      position: absolute;
      bottom: 5px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 6px;
    }
    .photo-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      line-height: 1;
      transition: transform 0.12s, opacity 0.12s;
      flex-shrink: 0;
    }
    .photo-btn:active { transform: scale(0.88); }
    .btn-eye  { background: rgba(34,197,94,0.85);  color: #fff; }
    .btn-eye.hidden-state { background: rgba(239,68,68,0.85); }
    .btn-star { background: rgba(30,30,30,0.85); color: rgba(255,255,255,0.5); }
    .btn-star.cover-state  { background: rgba(245,158,11,0.9); color: #fff; }

    /* ── Loading spinner ─────────────────────────── */
    .spinner-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 80px 20px;
      gap: 6px;
    }
    .sp-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: spPulse 1.2s ease-in-out infinite;
    }
    .sp-dot:nth-child(2) { animation-delay: 0.2s; }
    .sp-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes spPulse {
      0%,80%,100% { opacity: 0.25; transform: scale(0.75); }
      40%          { opacity: 1;    transform: scale(1.15); }
    }

    /* ── Toast ───────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      color: var(--text);
      padding: 9px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.09);
      white-space: nowrap;
      z-index: 9999;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Empty state ─────────────────────────────── */
    .empty { text-align: center; padding: 64px 20px; color: var(--muted); font-size: 14px; }

    /* ── Feed mode toggle bar ────────────────────── */
    .feed-mode-bar {
      padding: 10px 16px 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .feed-mode-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      flex-shrink: 0;
    }
    .feed-mode-pills {
      display: flex;
      background: var(--surface2);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
    }
    .feed-pill {
      padding: 5px 14px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font);
      color: var(--muted);
      background: transparent;
      transition: color 0.15s, background 0.15s;
      cursor: pointer;
    }
    .feed-pill.active {
      background: var(--accent);
      color: #fff;
    }
    .feed-mode-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Active/Inactive badge ───────────────────── */
    .badge-inactive {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      color: var(--red);
      border: 1px solid var(--red);
      border-radius: 4px;
      padding: 1px 5px;
      letter-spacing: 0.4px;
      margin-left: 6px;
      vertical-align: middle;
      text-transform: uppercase;
    }

    /* ── Row action buttons (feed + active toggle) ── */
    .row-actions {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
      align-items: flex-end;
    }
    .btn-toggle-active,
    .btn-feed-vis {
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.3px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .btn-toggle-active:hover,
    .btn-feed-vis:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
    .btn-toggle-active.active-state {
      color: var(--green);
      border-color: var(--green);
    }
    /* Feed visibility states */
    .btn-feed-vis.feed-excluded {
      color: var(--red);
      border-color: var(--red);
    }
    .btn-feed-vis.feed-included {
      color: var(--green);
      border-color: var(--green);
    }
    /* Row dimming for personas not in current feed */
    .persona-row.not-in-feed .persona-name,
    .persona-row.not-in-feed .persona-meta {
      opacity: 0.45;
    }
    .persona-row.not-in-feed .persona-avatar {
      opacity: 0.35;
    }

    /* ── Add persona button ───────────────────────── */
    .btn-add-persona {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .btn-add-persona:active { opacity: 0.8; }

    /* ── Modal ───────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #modal-overlay.open { display: flex; }
    .modal-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      max-width: 400px;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 22px;
    }
    .modal-field {
      margin-bottom: 14px;
    }
    .modal-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.18s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }
    .modal-checkbox-row input[type=checkbox] {
      width: 18px; height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .modal-checkbox-row label { font-size: 14px; cursor: pointer; }
    .modal-btns {
      display: flex;
      gap: 10px;
    }
    .modal-btn-cancel {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .modal-btn-cancel:hover { background: var(--surface2); }
    .modal-btn-submit {
      flex: 2;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      transition: opacity 0.15s;
    }
    .modal-btn-submit:active { opacity: 0.8; }
    .modal-btn-submit:disabled { opacity: 0.5; }
  </style>
</head>
<body>

<!-- ═══ LOCK SCREEN ════════════════════════════════ -->
<div id="lock">
  <div class="lock-card">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">Photo Admin</div>
    <div class="lock-sub">Enter admin password to continue</div>
    <input
      id="pw-input"
      class="lock-input"
      type="password"
      placeholder="Password"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="lock-btn" id="pw-btn">Unlock</button>
  </div>
</div>

<!-- ═══ APP ════════════════════════════════════════ -->
<div id="app">

  <!-- Top bar -->
  <div class="topbar">
    <button class="topbar-back hidden" id="back-btn" aria-label="Back">←</button>
    <div class="topbar-title" id="topbar-title">📸 Photo Admin</div>
    <button class="btn-add-persona" id="add-persona-btn" title="Add persona">+</button>
    <button class="topbar-logout" id="logout-btn">Logout</button>
  </div>

  <!-- Personas list -->
  <div id="personas-view">
    <div class="feed-mode-bar">
      <span class="feed-mode-label">Feed</span>
      <div class="feed-mode-pills">
        <button class="feed-pill" id="pill-all" data-mode="all">Show all</button>
        <button class="feed-pill" id="pill-selected" data-mode="selected">Selected only</button>
      </div>
      <span class="feed-mode-count" id="feed-count"></span>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="search-input" type="search" placeholder="🔍  Search personas…" />
    </div>
    <div class="persona-list" id="persona-list">
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- Photos for selected persona -->
  <div id="photos-view">
    <div class="photos-grid-admin" id="photos-grid">
      <!-- rendered by JS -->
    </div>
  </div>

</div>

<!-- ═══ ADD PERSONA MODAL ══════════════════════════ -->
<div id="modal-overlay">
  <div class="modal-card">
    <div class="modal-title">➕ Add Persona</div>
    <div class="modal-field">
      <label class="modal-label" for="modal-name">Display Name</label>
      <input class="modal-input" id="modal-name" type="text" placeholder="e.g. Sofia Rossi" autocomplete="off" />
    </div>
    <div class="modal-field">
      <label class="modal-label" for="modal-handle">Handle (without @)</label>
      <input class="modal-input" id="modal-handle" type="text" placeholder="e.g. sofia_rossi" autocomplete="off" />
    </div>
    <div class="modal-checkbox-row">
      <input type="checkbox" id="modal-active" checked />
      <label for="modal-active">Active (visible in the app)</label>
    </div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" id="modal-cancel">Cancel</button>
      <button class="modal-btn-submit" id="modal-submit">Create</button>
    </div>
  </div>
</div>

<!-- ═══ TOAST ══════════════════════════════════════ -->
<div id="toast"></div>

<script>
'use strict';

const API_BASE = 'https://onlydate-api.tg-saas.workers.dev';
const SESSION_KEY = 'od_admin_pw';

/* ── DOM refs ─────────────────────────────────── */
const $lock          = document.getElementById('lock');
const $app           = document.getElementById('app');
const $pwInput       = document.getElementById('pw-input');
const $pwBtn         = document.getElementById('pw-btn');
const $logoutBtn     = document.getElementById('logout-btn');
const $backBtn       = document.getElementById('back-btn');
const $topbarTitle   = document.getElementById('topbar-title');
const $personasView  = document.getElementById('personas-view');
const $photosView    = document.getElementById('photos-view');
const $personaList   = document.getElementById('persona-list');
const $photosGrid    = document.getElementById('photos-grid');
const $searchInput   = document.getElementById('search-input');
const $toast         = document.getElementById('toast');
const $addPersonaBtn = document.getElementById('add-persona-btn');
const $modalOverlay  = document.getElementById('modal-overlay');
const $modalName     = document.getElementById('modal-name');
const $modalHandle   = document.getElementById('modal-handle');
const $modalActive   = document.getElementById('modal-active');
const $modalCancel   = document.getElementById('modal-cancel');
const $modalSubmit   = document.getElementById('modal-submit');
const $pillAll       = document.getElementById('pill-all');
const $pillSelected  = document.getElementById('pill-selected');
const $feedCount     = document.getElementById('feed-count');

/* ── State ────────────────────────────────────── */
let password      = '';
let allPersonas   = [];
let currentPersId = null;
let toastTimer    = null;
let feedMode      = 'all'; // 'all' | 'selected'

/* ── Boot ─────────────────────────────────────── */
const saved = sessionStorage.getItem(SESSION_KEY);
if (saved) { password = saved; showApp(); }

/* ── Password gate ────────────────────────────── */
$pwBtn.addEventListener('click', attemptUnlock);
$pwInput.addEventListener('keydown', function (e) {
  if (e.key === 'Enter') attemptUnlock();
});

async function attemptUnlock() {
  const pw = $pwInput.value.trim();
  if (!pw) return;
  // Test against a lightweight endpoint
  try {
    const res = await fetch(API_BASE + '/api/onlydate/admin/personas', {
      headers: { 'X-Admin-Password': pw }
    });
    if (res.status === 401) {
      $pwInput.classList.add('shake');
      setTimeout(() => $pwInput.classList.remove('shake'), 400);
      showToast('Wrong password');
      return;
    }
    const data = await res.json();
    password = pw;
    sessionStorage.setItem(SESSION_KEY, pw);
    allPersonas = data.personas || [];
    showApp();
    renderPersonaList(allPersonas);
  } catch (e) {
    showToast('Connection error');
  }
}

function showApp() {
  $lock.style.display = 'none';
  $app.style.display = 'block';
  if (allPersonas.length === 0) loadPersonas();
  loadFeedSettings();
}

/* ── Load personas ────────────────────────────── */
async function loadPersonas() {
  $personaList.innerHTML = spinner();
  try {
    const res  = await fetch(API_BASE + '/api/onlydate/admin/personas', {
      headers: { 'X-Admin-Password': password }
    });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    allPersonas = data.personas || [];
    renderPersonaList(allPersonas);
  } catch (e) {
    $personaList.innerHTML = '<div class="empty">Failed to load. Check connection.</div>';
  }
}

/* ── Feed settings ────────────────────────────── */
async function loadFeedSettings() {
  try {
    var res = await fetch(API_BASE + '/api/onlydate/admin/feed-settings', {
      headers: { 'X-Admin-Password': password }
    });
    if (!res.ok) return;
    var data = await res.json();
    feedMode = data.mode || 'all';
    updateFeedModeUI();
  } catch {}
}

function updateFeedModeUI() {
  $pillAll.classList.toggle('active', feedMode === 'all');
  $pillSelected.classList.toggle('active', feedMode === 'selected');
  // Count how many are in the feed right now
  var inFeed = allPersonas.filter(function (p) {
    if (feedMode === 'selected') return p.feed_visible === 1;
    return p.feed_visible !== 0;
  }).length;
  $feedCount.textContent = inFeed + ' in feed';
}

document.querySelector('.feed-mode-pills').addEventListener('click', async function (e) {
  var btn = e.target.closest('.feed-pill');
  if (!btn) return;
  var newMode = btn.dataset.mode;
  if (newMode === feedMode) return;
  btn.disabled = true;
  try {
    var res = await fetch(API_BASE + '/api/onlydate/admin/feed-settings', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': password },
      body:    JSON.stringify({ mode: newMode }),
    });
    if (!res.ok) throw new Error();
    feedMode = newMode;
    updateFeedModeUI();
    renderPersonaList(
      $searchInput.value.trim()
        ? allPersonas.filter(function (p) {
            var q = $searchInput.value.trim().toLowerCase();
            return p.name.toLowerCase().includes(q) || (p.username||'').toLowerCase().includes(q);
          })
        : allPersonas
    );
    showToast(newMode === 'all' ? 'Feed mode: Show all' : 'Feed mode: Selected only');
  } catch {
    showToast('Error — try again');
  } finally {
    btn.disabled = false;
  }
});

/* ── Render personas list ─────────────────────── */
function isInFeed(p) {
  if (feedMode === 'selected') return p.feed_visible === 1;
  return p.feed_visible !== 0; // all mode: in feed unless explicitly excluded
}

function feedVisBtn(p) {
  var inFeed = isInFeed(p);
  if (feedMode === 'all') {
    if (p.feed_visible === 0) {
      // Explicitly excluded → show "Excluded" (red), click restores to null
      return '<button class="btn-feed-vis feed-excluded" data-action="feed-vis" ' +
        'data-persona-id="' + escHtml(p.id) + '" data-next-vis="null">Excluded</button>';
    }
    // In feed (null or 1) → show "Exclude" button
    return '<button class="btn-feed-vis" data-action="feed-vis" ' +
      'data-persona-id="' + escHtml(p.id) + '" data-next-vis="0">Exclude</button>';
  } else {
    // selected mode
    if (p.feed_visible === 1) {
      // Explicitly included → show "In feed" (green), click removes
      return '<button class="btn-feed-vis feed-included" data-action="feed-vis" ' +
        'data-persona-id="' + escHtml(p.id) + '" data-next-vis="null">In feed</button>';
    }
    // Not in feed → show "+ Add" button
    return '<button class="btn-feed-vis" data-action="feed-vis" ' +
      'data-persona-id="' + escHtml(p.id) + '" data-next-vis="1">+ Add</button>';
  }
}

function renderPersonaList(personas) {
  if (personas.length === 0) {
    $personaList.innerHTML = '<div class="empty">No personas found.</div>';
    return;
  }
  $personaList.innerHTML = personas.map(function (p) {
    const firstVisible  = p.photos.find(function (ph) { return !ph.is_hidden; });
    const firstPhoto    = p.photos[0];
    const avatar        = (firstVisible || firstPhoto || {}).file_url || '';
    const visCount      = p.photos.filter(function (ph) { return !ph.is_hidden; }).length;
    const handle        = (p.username || '').replace(/^@/, '');
    const inactiveBadge = p.is_active ? '' : '<span class="badge-inactive">inactive</span>';
    const photosMeta    = p.photos.length === 0
      ? 'No photos'
      : visCount + ' visible / ' + p.photos.length + ' total';
    const activeLabel   = p.is_active ? 'Deactivate' : 'Activate';
    const activeClass   = p.is_active ? '' : ' active-state';
    const notInFeedClass = isInFeed(p) ? '' : ' not-in-feed';
    return (
      '<div class="persona-row' + notInFeedClass + '" data-persona-id="' + escHtml(p.id) + '">' +
        '<img class="persona-avatar" src="' + escHtml(avatar) + '" alt="" ' +
            'onerror="this.style.opacity=\'0\'">' +
        '<div class="persona-info">' +
          '<div class="persona-name">' + escHtml(p.name) + inactiveBadge + '</div>' +
          '<div class="persona-meta">@' + escHtml(handle) + ' · ' + photosMeta + '</div>' +
        '</div>' +
        '<div class="row-actions">' +
          feedVisBtn(p) +
          '<button class="btn-toggle-active' + activeClass + '" data-action="toggle-active" ' +
              'data-persona-id="' + escHtml(p.id) + '" data-is-active="' + (p.is_active ? '1' : '0') + '">' +
            activeLabel +
          '</button>' +
        '</div>' +
        '<div class="persona-arrow">›</div>' +
      '</div>'
    );
  }).join('');
  updateFeedModeUI();
}

/* ── Search ───────────────────────────────────── */
$searchInput.addEventListener('input', function () {
  const q = this.value.trim().toLowerCase();
  const filtered = q
    ? allPersonas.filter(function (p) {
        return p.name.toLowerCase().includes(q) ||
               (p.username || '').toLowerCase().includes(q);
      })
    : allPersonas;
  renderPersonaList(filtered);
});

/* ── Persona list click ───────────────────────── */
$personaList.addEventListener('click', async function (e) {
  // Feed visibility button
  var feedBtn = e.target.closest('[data-action="feed-vis"]');
  if (feedBtn) {
    e.stopPropagation();
    var pid     = feedBtn.dataset.personaId;
    var nextRaw = feedBtn.dataset.nextVis;
    var nextVal = nextRaw === '1' ? 1 : nextRaw === '0' ? 0 : null;
    feedBtn.disabled = true;
    try {
      var res = await fetch(API_BASE + '/api/onlydate/admin/persona/set-feed-visibility', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': password },
        body:    JSON.stringify({ persona_id: pid, feed_visible: nextVal }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var persona = allPersonas.find(function (p) { return p.id === pid; });
      if (persona) persona.feed_visible = nextVal;
      renderPersonaList(
        $searchInput.value.trim()
          ? allPersonas.filter(function (p) {
              var q = $searchInput.value.trim().toLowerCase();
              return p.name.toLowerCase().includes(q) || (p.username||'').toLowerCase().includes(q);
            })
          : allPersonas
      );
      if (feedMode === 'all') {
        showToast(nextVal === 0 ? 'Excluded from feed' : 'Restored to feed');
      } else {
        showToast(nextVal === 1 ? 'Added to feed' : 'Removed from feed');
      }
    } catch {
      showToast('Error — try again');
    } finally {
      feedBtn.disabled = false;
    }
    return;
  }

  // Toggle active button
  var btn = e.target.closest('[data-action="toggle-active"]');
  if (btn) {
    e.stopPropagation();
    var pid      = btn.dataset.personaId;
    var newActive = btn.dataset.isActive !== '1';
    btn.disabled = true;
    try {
      var res = await fetch(API_BASE + '/api/onlydate/admin/persona/toggle-active', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': password },
        body:    JSON.stringify({ persona_id: pid, is_active: newActive }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var persona = allPersonas.find(function (p) { return p.id === pid; });
      if (persona) persona.is_active = newActive;
      renderPersonaList(
        $searchInput.value.trim()
          ? allPersonas.filter(function (p) {
              var q = $searchInput.value.trim().toLowerCase();
              return p.name.toLowerCase().includes(q) || (p.username||'').toLowerCase().includes(q);
            })
          : allPersonas
      );
      showToast(newActive ? 'Activated' : 'Deactivated');
    } catch {
      showToast('Error — try again');
    } finally {
      btn.disabled = false;
    }
    return;
  }
  // Open photos
  var row = e.target.closest('.persona-row');
  if (!row) return;
  openPersonaPhotos(row.dataset.personaId);
});

function openPersonaPhotos(personaId) {
  const persona = allPersonas.find(function (p) { return p.id === personaId; });
  if (!persona) return;
  currentPersId = personaId;

  $personasView.style.display  = 'none';
  $photosView.style.display    = 'block';
  $backBtn.classList.remove('hidden');
  $addPersonaBtn.style.display = 'none';
  $topbarTitle.textContent     = persona.name;

  renderPhotoGrid(persona);
}

/* ── Back ─────────────────────────────────────── */
$backBtn.addEventListener('click', showPersonasView);
function showPersonasView() {
  $photosView.style.display    = 'none';
  $personasView.style.display  = 'block';
  $backBtn.classList.add('hidden');
  $addPersonaBtn.style.display = '';
  $topbarTitle.textContent     = '📸 Photo Admin';
  currentPersId = null;
  // Refresh persona list meta (visible counts may have changed)
  renderPersonaList(
    $searchInput.value.trim()
      ? allPersonas.filter(function (p) {
          var q = $searchInput.value.trim().toLowerCase();
          return p.name.toLowerCase().includes(q) ||
                 (p.username || '').toLowerCase().includes(q);
        })
      : allPersonas
  );
}

/* ── Render photo grid ────────────────────────── */
function renderPhotoGrid(persona) {
  if (persona.photos.length === 0) {
    $photosGrid.innerHTML = '<div class="empty" style="grid-column:1/-1">No photos.</div>';
    return;
  }
  $photosGrid.innerHTML = persona.photos.map(function (ph) {
    var hiddenClass  = ph.is_hidden ? ' hidden-photo' : '';
    var coverClass   = ph.is_cover  ? ' is-cover'     : '';
    var eyeState     = ph.is_hidden ? ' hidden-state'  : '';
    var eyeIcon      = ph.is_hidden ? '🚫'             : '👁';
    var starState    = ph.is_cover  ? ' cover-state'   : '';
    var starIcon     = ph.is_cover  ? '⭐'             : '☆';
    return (
      '<div class="photo-card' + hiddenClass + coverClass + '" data-media-id="' + escHtml(ph.media_id) + '">' +
        '<img src="' + escHtml(ph.file_url) + '" loading="lazy" alt="">' +
        '<div class="photo-overlay"><span class="photo-overlay-text">Hidden</span></div>' +
        '<div class="cover-badge">Cover</div>' +
        '<div class="photo-actions">' +
          '<button class="photo-btn btn-eye' + eyeState + '" data-action="toggle" title="Toggle visibility">' + eyeIcon + '</button>' +
          '<button class="photo-btn btn-star' + starState + '" data-action="cover" title="Set as cover">' + starIcon + '</button>' +
        '</div>' +
      '</div>'
    );
  }).join('');
}

/* ── Photo action clicks ──────────────────────── */
$photosGrid.addEventListener('click', async function (e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var card    = btn.closest('.photo-card');
  var mediaId = card.dataset.mediaId;
  var persona = allPersonas.find(function (p) { return p.id === currentPersId; });
  if (!persona) return;
  var photo   = persona.photos.find(function (ph) { return ph.media_id === mediaId; });
  if (!photo) return;

  var action = btn.dataset.action;

  if (action === 'toggle') {
    btn.disabled = true;
    try {
      const newHidden = !photo.is_hidden;
      const res = await fetch(API_BASE + '/api/onlydate/admin/photo/toggle', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': password },
        body:    JSON.stringify({ media_id: mediaId, is_hidden: newHidden }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      photo.is_hidden = newHidden;
      // Update card
      card.classList.toggle('hidden-photo', newHidden);
      btn.classList.toggle('hidden-state', newHidden);
      btn.textContent = newHidden ? '🚫' : '👁';
      showToast(newHidden ? 'Photo hidden' : 'Photo visible');
    } catch {
      showToast('Error — try again');
    } finally {
      btn.disabled = false;
    }
  }

  if (action === 'cover') {
    if (photo.is_cover) return; // already cover
    btn.disabled = true;
    try {
      const res = await fetch(API_BASE + '/api/onlydate/admin/photo/cover', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': password },
        body:    JSON.stringify({ media_id: mediaId, persona_id: persona.id }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      // Update state
      persona.photos.forEach(function (ph) { ph.is_cover = false; });
      photo.is_cover = true;
      // Re-render grid to reflect new cover
      renderPhotoGrid(persona);
      showToast('Cover photo set ⭐');
    } catch {
      showToast('Error — try again');
    } finally {
      btn.disabled = false;
    }
  }
});

/* ── Add persona modal ────────────────────────── */
$addPersonaBtn.addEventListener('click', function () {
  $modalName.value     = '';
  $modalHandle.value   = '';
  $modalActive.checked = true;
  $modalOverlay.classList.add('open');
  $modalName.focus();
});

$modalCancel.addEventListener('click', function () {
  $modalOverlay.classList.remove('open');
});

$modalOverlay.addEventListener('click', function (e) {
  if (e.target === $modalOverlay) $modalOverlay.classList.remove('open');
});

// Auto-fill handle from name
$modalName.addEventListener('input', function () {
  if ($modalHandle.dataset.edited) return;
  $modalHandle.value = $modalName.value.trim()
    .toLowerCase()
    .replace(/\s+/g, '_')
    .replace(/[^a-z0-9_]/g, '');
});
$modalHandle.addEventListener('input', function () {
  $modalHandle.dataset.edited = '1';
});

$modalSubmit.addEventListener('click', submitNewPersona);
$modalName.addEventListener('keydown',   function (e) { if (e.key === 'Enter') $modalHandle.focus(); });
$modalHandle.addEventListener('keydown', function (e) { if (e.key === 'Enter') submitNewPersona(); });

async function submitNewPersona() {
  var name   = $modalName.value.trim();
  var handle = $modalHandle.value.trim().replace(/^@/, '');
  if (!name)   { $modalName.focus();   showToast('Enter display name'); return; }
  if (!handle) { $modalHandle.focus(); showToast('Enter handle'); return; }

  $modalSubmit.disabled = true;
  $modalSubmit.textContent = 'Creating…';
  try {
    var res = await fetch(API_BASE + '/api/onlydate/admin/persona/create', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': password },
      body:    JSON.stringify({ display_name: name, handle: handle, is_active: $modalActive.checked }),
    });
    var data = await res.json();
    if (!res.ok) {
      showToast(data.error || 'Error creating persona');
      return;
    }
    allPersonas.unshift(data.persona);
    $modalOverlay.classList.remove('open');
    delete $modalHandle.dataset.edited;
    renderPersonaList(allPersonas);
    showToast('Persona created ✓');
  } catch {
    showToast('Connection error');
  } finally {
    $modalSubmit.disabled = false;
    $modalSubmit.textContent = 'Create';
  }
}

/* ── Logout ───────────────────────────────────── */
$logoutBtn.addEventListener('click', doLogout);
function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  password    = '';
  allPersonas = [];
  $app.style.display  = 'none';
  $lock.style.display = 'flex';
  $pwInput.value      = '';
  showPersonasView();
}

/* ── Helpers ──────────────────────────────────── */
function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { $toast.classList.remove('show'); }, 2200);
}

function spinner() {
  return '<div class="spinner-wrap">' +
    '<div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div>' +
    '</div>';
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#039;');
}
</script>
</body>
