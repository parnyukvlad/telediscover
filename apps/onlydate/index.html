<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>OnlyDate</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* ─────────────────────────────────────────────────
       Design Tokens
    ───────────────────────────────────────────────── */
    :root {
      --bg:           #0a0a0a;
      --surface:      #141414;
      --surface2:     #1e1e1e;
      --accent:       #a855f7;
      --accent-glow:  rgba(168, 85, 247, 0.15);
      --accent-dim:   rgba(168, 85, 247, 0.35);
      --text:         #ffffff;
      --text-muted:   #888888;
      --radius-card:  16px;
      --font:         -apple-system, "SF Pro Display", system-ui, sans-serif;
    }

    /* ─────────────────────────────────────────────────
       Reset
    ───────────────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    img { display: block; }
    button { font-family: var(--font); }

    /* ─────────────────────────────────────────────────
       Views
    ───────────────────────────────────────────────── */
    #grid-view    { display: block;  min-height: 100vh; }
    #profile-view { display: none;   min-height: 100vh; background: var(--bg); }

    /* ─────────────────────────────────────────────────
       Header
    ───────────────────────────────────────────────── */
    .header {
      padding: 22px 16px 10px;
      text-align: center;
    }
    .header-logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-tagline {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 0.2px;
    }

    /* ─────────────────────────────────────────────────
       Tab Bar
    ───────────────────────────────────────────────── */
    .tab-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: 8px 12px 10px;
      display: flex;
      gap: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .tab-pill {
      flex: 1;
      padding: 9px 6px;
      border-radius: 20px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      white-space: nowrap;
      text-align: center;
    }
    .tab-pill.active {
      background: var(--text);
      color: #000000;
      font-weight: 700;
    }

    /* ─────────────────────────────────────────────────
       Model Grid
    ───────────────────────────────────────────────── */
    .model-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px;
    }

    /* ─────────────────────────────────────────────────
       Model Card
    ───────────────────────────────────────────────── */
    .model-card {
      position: relative;
      border-radius: var(--radius-card);
      overflow: hidden;
      aspect-ratio: 3 / 4;
      cursor: pointer;
      background: var(--surface2);
      transition: transform 0.14s ease;
      -webkit-user-select: none;
      user-select: none;
    }
    .model-card:active {
      transform: scale(0.97);
    }
    .model-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .model-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.78) 0%,
        rgba(0,0,0,0.15) 50%,
        transparent 100%
      );
    }
    .model-card-info {
      position: absolute;
      bottom: 11px;
      left: 11px;
      right: 11px;
    }
    .model-card-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    }
    .model-card-handle {
      font-size: 11px;
      color: rgba(255,255,255,0.65);
      margin-top: 2px;
    }

    /* ─────────────────────────────────────────────────
       Skeleton / Loading
    ───────────────────────────────────────────────── */
    .skeleton {
      border-radius: var(--radius-card);
      aspect-ratio: 3 / 4;
      background: var(--surface2);
      overflow: hidden;
      position: relative;
    }
    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.04) 50%,
        transparent 100%
      );
      animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%);  }
    }

    /* ─────────────────────────────────────────────────
       Empty State
    ───────────────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 20px;
      color: var(--text-muted);
    }
    .empty-icon  { font-size: 44px; margin-bottom: 14px; }
    .empty-text  { font-size: 15px; }

    /* ─────────────────────────────────────────────────
       Profile — Header bar
    ───────────────────────────────────────────────── */
    .profile-topbar {
      display: flex;
      align-items: center;
      padding: 14px 16px 10px;
      gap: 12px;
    }
    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface);
      border: none;
      color: var(--text);
      font-size: 19px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .back-btn:active { background: var(--surface2); }
    .profile-topbar-title {
      font-size: 17px;
      font-weight: 600;
    }

    /* ─────────────────────────────────────────────────
       Profile — Content
    ───────────────────────────────────────────────── */
    .profile-content {
      padding: 0 16px 40px;
    }
    .profile-avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
      background: var(--surface2);
    }
    .profile-name {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .profile-username {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* ─────────────────────────────────────────────────
       Profile — Action buttons
    ───────────────────────────────────────────────── */
    .profile-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    .btn-primary, .btn-outline {
      flex: 1;
      padding: 13px 8px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.14s, background 0.14s;
    }
    .btn-primary {
      border: none;
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:active { opacity: 0.80; }
    .btn-outline {
      border: 1.5px solid var(--accent);
      background: transparent;
      color: var(--accent);
    }
    .btn-outline:active { background: var(--accent-glow); }

    /* ─────────────────────────────────────────────────
       Profile — Photos
    ───────────────────────────────────────────────── */
    .profile-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin-bottom: 18px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .photos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .photo-item {
      aspect-ratio: 3 / 4;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface2);
      transition: opacity 0.15s;
    }
    .photo-item:active { opacity: 0.85; }
    .photo-item img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    /* ─────────────────────────────────────────────────
       Lightbox
    ───────────────────────────────────────────────── */
    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      padding: 56px 0 32px;
      overflow: hidden;
    }
    #lightbox.open { display: flex; }
    #lightbox-img {
      max-width: 100%;
      max-height: calc(100vh - 150px);
      width: auto;
      height: auto;
      object-fit: contain;
      flex-shrink: 1;
      pointer-events: none;
      will-change: transform, opacity;
    }
    @keyframes lbSlideLeft {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes lbSlideRight {
      from { transform: translateX(-40px); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }
    .lb-anim-left  { animation: lbSlideLeft  0.22s ease forwards; }
    .lb-anim-right { animation: lbSlideRight 0.22s ease forwards; }
    #lightbox-dots {
      display: flex;
      gap: 6px;
      margin-top: 16px;
      align-items: center;
      justify-content: center;
      min-height: 10px;
      flex-shrink: 0;
    }
    .lb-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      transition: background 0.18s, transform 0.18s;
      flex-shrink: 0;
    }
    .lb-dot.active {
      background: #fff;
      transform: scale(1.4);
    }
    #lightbox-counter {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      font-weight: 500;
    }
    #lightbox-msg {
      margin-top: 16px;
      padding: 9px 28px;
      border-radius: 20px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.14s;
      flex-shrink: 0;
    }
    #lightbox-msg:active { background: rgba(255,255,255,0.25); }
    #lightbox-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      border: none;
      color: #fff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font);
    }
    .no-photos {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      padding: 20px 0;
    }

    /* ─────────────────────────────────────────────────
       Profile — Loading dots
    ───────────────────────────────────────────────── */
    .profile-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 64px 0;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.75); }
      40%            { opacity: 1;    transform: scale(1.15); }
    }

    /* ─────────────────────────────────────────────────
       Toast
    ───────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      color: var(--text);
      padding: 10px 22px;
      border-radius: 22px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.09);
      white-space: nowrap;
      z-index: 9999;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ─────────────────────────────────────────────────
       Fade-in animation
    ───────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    .fade-up {
      animation: fadeUp 0.22s ease forwards;
    }
  </style>
</head>

<body>

<!-- ═══════════════════════════════════════════════
     GRID VIEW
══════════════════════════════════════════════════ -->
<div id="grid-view">

  <header class="header">
    <div class="header-logo">OnlyDate</div>
    <div class="header-tagline">Discover. Connect. Chat.</div>
  </header>

  <nav class="tab-bar" id="tab-bar">
    <button class="tab-pill active" data-tab="trending">🔥 Trending</button>
    <button class="tab-pill"        data-tab="popular">💎 Popular</button>
    <button class="tab-pill"        data-tab="new">✨ New</button>
  </nav>

  <div class="model-grid" id="grid-container">
    <!-- Cards or skeletons rendered here -->
  </div>

</div>

<!-- ═══════════════════════════════════════════════
     PROFILE VIEW
══════════════════════════════════════════════════ -->
<div id="profile-view">

  <div class="profile-topbar">
    <button class="back-btn" id="back-btn" aria-label="Back">←</button>
    <span class="profile-topbar-title">Profile</span>
  </div>

  <div class="profile-content" id="profile-content">
    <!-- Populated by JS -->
  </div>

</div>

<!-- ═══════════════════════════════════════════════
     TOAST
══════════════════════════════════════════════════ -->
<div id="toast" role="status" aria-live="polite"></div>

<!-- ═══════════════════════════════════════════════
     LIGHTBOX
══════════════════════════════════════════════════ -->
<div id="lightbox">
  <button id="lightbox-close" aria-label="Close">✕</button>
  <img id="lightbox-img" src="" alt="photo" />
  <div id="lightbox-dots"></div>
  <button id="lightbox-msg">Message</button>
</div>

<!-- ═══════════════════════════════════════════════
     APP SCRIPT
══════════════════════════════════════════════════ -->
<script>
'use strict';

/* ─────────────────────────────────────────────────
   Config — update API_BASE if your Worker URL differs
───────────────────────────────────────────────── */
const API_BASE = 'https://onlydate-api.tg-saas.workers.dev';

/* ─────────────────────────────────────────────────
   Telegram Mini App init
───────────────────────────────────────────────── */
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  if (typeof tg.setHeaderColor     === 'function') tg.setHeaderColor('#0a0a0a');
  if (typeof tg.setBackgroundColor === 'function') tg.setBackgroundColor('#0a0a0a');
}

/* ─────────────────────────────────────────────────
   State
───────────────────────────────────────────────── */
const cache = { trending: null, popular: null, new: null };
let currentTab     = 'trending';
let currentProfile = null;
let toastTimer     = null;

/* ─────────────────────────────────────────────────
   DOM refs
───────────────────────────────────────────────── */
const $gridView      = document.getElementById('grid-view');
const $profileView   = document.getElementById('profile-view');
const $gridContainer = document.getElementById('grid-container');
const $profileContent= document.getElementById('profile-content');
const $tabBar        = document.getElementById('tab-bar');
const $backBtn       = document.getElementById('back-btn');
const $toast         = document.getElementById('toast');

/* ─────────────────────────────────────────────────
   Init
───────────────────────────────────────────────── */
function init() {
  renderSkeletons();
  attachTabEvents();
  attachGridEvents();
  $backBtn.addEventListener('click', showGrid);

  // Telegram back button — register once
  if (tg && tg.BackButton) {
    tg.BackButton.onClick(function () {
      if ($profileView.style.display !== 'none') showGrid();
    });
  }

  // Fetch all 3 tabs in parallel, then render current
  Promise.all([
    fetchModels('trending'),
    fetchModels('popular'),
    fetchModels('new'),
  ]).then(function (results) {
    cache.trending = results[0];
    cache.popular  = results[1];
    cache.new      = results[2];
    renderGrid(currentTab);
  });
}

/* ─────────────────────────────────────────────────
   API
───────────────────────────────────────────────── */
async function fetchModels(tab) {
  try {
    const res = await fetch(API_BASE + '/api/onlydate/models?tab=' + encodeURIComponent(tab));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    return Array.isArray(data.models) ? data.models : [];
  } catch (e) {
    console.error('[OnlyDate] fetchModels(' + tab + '):', e);
    return [];
  }
}

async function fetchProfile(username) {
  const res = await fetch(API_BASE + '/api/onlydate/models/' + encodeURIComponent(username));
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

/* ─────────────────────────────────────────────────
   Render — Skeletons
───────────────────────────────────────────────── */
function renderSkeletons() {
  $gridContainer.innerHTML = Array.from({ length: 8 })
    .map(function () { return '<div class="skeleton"></div>'; })
    .join('');
}

/* ─────────────────────────────────────────────────
   Render — Grid
───────────────────────────────────────────────── */
function renderGrid(tab) {
  const models = cache[tab];
  if (!models) { renderSkeletons(); return; }

  if (models.length === 0) {
    $gridContainer.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">💔</div>' +
        '<div class="empty-text">No models found</div>' +
      '</div>';
    return;
  }

  $gridContainer.innerHTML = models.map(function (m, i) {
    const name    = escHtml(m.name     || '');
    const handle  = escHtml(m.username || '');
    const imgSrc  = escHtml(m.cover_photo || '');
    const delay   = Math.min(i * 30, 300);

    return (
      '<div class="model-card fade-up" data-username="' + handle + '" ' +
          'style="animation-delay:' + delay + 'ms">' +
        '<img class="model-card-img" src="' + imgSrc + '" ' +
            'loading="lazy" alt="' + name + '" ' +
            'onerror="this.style.opacity=\'0\'">' +
        '<div class="model-card-overlay"></div>' +
        '<div class="model-card-info">' +
          '<div class="model-card-name">'   + name   + '</div>' +
          '<div class="model-card-handle">@' + handle.replace(/^@/, '') + '</div>' +
        '</div>' +
      '</div>'
    );
  }).join('');
}

/* ─────────────────────────────────────────────────
   Tab switching
───────────────────────────────────────────────── */
function attachTabEvents() {
  $tabBar.addEventListener('click', function (e) {
    var pill = e.target.closest('.tab-pill');
    if (!pill) return;
    var tab = pill.dataset.tab;
    if (tab === currentTab) return;
    currentTab = tab;

    // Update pill styles
    $tabBar.querySelectorAll('.tab-pill').forEach(function (p) {
      p.classList.toggle('active', p.dataset.tab === tab);
    });

    renderGrid(tab);
  });
}

/* ─────────────────────────────────────────────────
   Grid click → Profile
───────────────────────────────────────────────── */
function attachGridEvents() {
  $gridContainer.addEventListener('click', function (e) {
    var card = e.target.closest('.model-card');
    if (card && card.dataset.username) openProfile(card.dataset.username);
  });
}

/* ─────────────────────────────────────────────────
   Open Profile View
───────────────────────────────────────────────── */
async function openProfile(username) {
  // Switch views
  $gridView.style.display    = 'none';
  $profileView.style.display = 'block';
  window.scrollTo(0, 0);

  // Show Telegram back button
  if (tg && tg.BackButton) tg.BackButton.show();

  // Loading state
  $profileContent.innerHTML =
    '<div class="profile-loading">' +
      '<div class="dot"></div>' +
      '<div class="dot"></div>' +
      '<div class="dot"></div>' +
    '</div>';

  try {
    const profile = await fetchProfile(username);
    currentProfile = profile;
    renderProfile(profile);
  } catch (e) {
    console.error('[OnlyDate] fetchProfile error:', e);
    $profileContent.innerHTML =
      '<div class="empty-state" style="padding-top:80px">' +
        '<div class="empty-icon">⚠️</div>' +
        '<div class="empty-text">Could not load profile</div>' +
      '</div>';
  }
}

/* ─────────────────────────────────────────────────
   Render Profile
───────────────────────────────────────────────── */
function renderProfile(p) {
  const name     = escHtml(p.name     || 'Unknown');
  const username = escHtml(p.username || '');
  const avatar   = escHtml(p.cover_photo || '');

  var photosHtml = '';
  if (p.free_photos && p.free_photos.length > 0) {
    photosHtml = p.free_photos.map(function (url, i) {
      var delay = Math.min(i * 50, 500);
      return (
        '<div class="photo-item fade-up" style="animation-delay:' + delay + 'ms" ' +
            'data-photo-index="' + i + '">' +
          '<img src="' + escHtml(url) + '" loading="lazy" alt="photo">' +
        '</div>'
      );
    }).join('');
  } else {
    photosHtml = '<p class="no-photos">No photos available</p>';
  }

  $profileContent.innerHTML =
    '<div class="profile-avatar-wrap fade-up" style="animation-delay:0ms">' +
      '<img class="profile-avatar" src="' + avatar + '" alt="' + name + '" ' +
          'onerror="this.style.opacity=\'0\'">' +
    '</div>' +
    '<div class="profile-name fade-up"     style="animation-delay:40ms">' + name + '</div>' +
    '<div class="profile-username fade-up" style="animation-delay:60ms">@' + username.replace(/^@/, '') + '</div>' +
    '<div class="profile-actions fade-up"  style="animation-delay:80ms">' +
      '<button class="btn-primary" id="btn-msg">💬 Message</button>' +
      '<button class="btn-outline" id="btn-share">↗ Share</button>' +
    '</div>' +
    '<div class="profile-divider"></div>' +
    '<div class="section-label">Photos</div>' +
    '<div class="photos-grid fade-up" id="photos-grid" style="animation-delay:120ms">' +
      photosHtml +
    '</div>';

  // Bind action buttons (now in DOM)
  document.getElementById('btn-msg').addEventListener('click', onMessageClick);
  document.getElementById('btn-share').addEventListener('click', onShareClick);

  // Photo tap → lightbox
  var grid = document.getElementById('photos-grid');
  if (grid) {
    grid.addEventListener('click', function (e) {
      var item = e.target.closest('.photo-item');
      if (!item) return;
      var idx = parseInt(item.dataset.photoIndex, 10);
      if (!isNaN(idx) && p.free_photos && p.free_photos.length > 0) {
        openLightbox(p.free_photos, idx);
      }
    });
  }
}

/* ─────────────────────────────────────────────────
   Show Grid (back navigation)
───────────────────────────────────────────────── */
function showGrid() {
  $profileView.style.display = 'none';
  $gridView.style.display    = 'block';
  currentProfile = null;
  window.scrollTo(0, 0);

  if (tg && tg.BackButton) tg.BackButton.hide();
}

/* ─────────────────────────────────────────────────
   Profile actions
───────────────────────────────────────────────── */
function onMessageClick() {
  if (!currentProfile || !currentProfile.username) return;
  var url = 'https://t.me/' + encodeURIComponent(currentProfile.username);
  if (tg && tg.openTelegramLink) {
    tg.openTelegramLink(url);
  } else {
    window.open(url, '_blank');
  }
}

function onShareClick() {
  if (!currentProfile || !currentProfile.username) return;
  var text = '@' + currentProfile.username.replace(/^@/, '');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(function () { showToast('Copied! ✓'); })
      .catch(function () { showToast(text); });
  } else {
    showToast(text);
  }
}

/* ─────────────────────────────────────────────────
   Toast
───────────────────────────────────────────────── */
function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () {
    $toast.classList.remove('show');
  }, 2200);
}

/* ─────────────────────────────────────────────────
   Utils — HTML escaping
───────────────────────────────────────────────── */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#039;');
}

/* ─────────────────────────────────────────────────
   Lightbox
───────────────────────────────────────────────── */
var $lightbox      = document.getElementById('lightbox');
var $lightboxImg   = document.getElementById('lightbox-img');
var $lightboxMsg   = document.getElementById('lightbox-msg');
var $lightboxClose = document.getElementById('lightbox-close');
var $lightboxDots  = document.getElementById('lightbox-dots');

var _lbPhotos = [];
var _lbIndex  = 0;
var _lbTouchX = 0;
var _lbTouchY = 0;

function openLightbox(photos, index) {
  _lbPhotos = photos;
  _lbIndex  = index;
  $lightbox.classList.add('open');
  _showLbPhoto(index, null);
}

function closeLightbox() {
  $lightbox.classList.remove('open');
  $lightboxImg.src = '';
  $lightboxImg.className = '';
  $lightboxDots.innerHTML = '';
  _lbPhotos = [];
  _lbIndex  = 0;
}

function _showLbPhoto(index, dir) {
  _lbIndex = index;

  // Slide animation
  $lightboxImg.className = '';
  if (dir) {
    // Force reflow so animation restarts
    void $lightboxImg.offsetWidth;
    $lightboxImg.classList.add(dir === 'next' ? 'lb-anim-left' : 'lb-anim-right');
  }

  $lightboxImg.src = _lbPhotos[index];

  // Dots / counter
  var count = _lbPhotos.length;
  if (count <= 1) {
    $lightboxDots.innerHTML = '';
  } else if (count <= 10) {
    $lightboxDots.innerHTML = _lbPhotos.map(function (_, i) {
      return '<div class="lb-dot' + (i === index ? ' active' : '') + '"></div>';
    }).join('');
  } else {
    $lightboxDots.innerHTML = '<span id="lightbox-counter">' + (index + 1) + ' / ' + count + '</span>';
  }
}

function _lbNext() {
  if (_lbPhotos.length < 2) return;
  _showLbPhoto((_lbIndex + 1) % _lbPhotos.length, 'next');
}

function _lbPrev() {
  if (_lbPhotos.length < 2) return;
  _showLbPhoto((_lbIndex - 1 + _lbPhotos.length) % _lbPhotos.length, 'prev');
}

// Touch swipe
$lightbox.addEventListener('touchstart', function (e) {
  _lbTouchX = e.touches[0].clientX;
  _lbTouchY = e.touches[0].clientY;
}, { passive: true });

$lightbox.addEventListener('touchend', function (e) {
  var dx = e.changedTouches[0].clientX - _lbTouchX;
  var dy = e.changedTouches[0].clientY - _lbTouchY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 44) {
    dx < 0 ? _lbNext() : _lbPrev();
  }
}, { passive: true });

$lightboxClose.addEventListener('click', closeLightbox);
$lightbox.addEventListener('click', function (e) {
  if (e.target === $lightbox) closeLightbox();
});
$lightboxMsg.addEventListener('click', function () {
  closeLightbox();
  onMessageClick();
});

/* ─────────────────────────────────────────────────
   Boot
───────────────────────────────────────────────── */
init();
</script>
