<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TeleDiscover</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:           #0f1115;
      --surface:      #1a1c20;
      --surface2:     #1a1c20;
      --text:         #ffffff;
      --text-muted:   #9aa0a6;
      --blue:         #1DA1F2;
      --radius-card:  14px;
      --font:         -apple-system, "SF Pro Display", system-ui, sans-serif;
    }

    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    img { display: block; }
    button { font-family: var(--font); }
    a { color: inherit; text-decoration: none; }

    /* ── Views ── */
    #grid-view    { display: block;  min-height: 100vh; }
    #profile-view { display: none;   min-height: 100vh; background: var(--bg); }

    /* ── Header ── */
    .header {
      padding: 20px 16px 8px;
      text-align: center;
    }
    .header-logo {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 2px;
      color: #fff;
    }

    /* ── Tab Bar ── */
    .tab-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: 8px 12px 10px;
      display: flex;
      gap: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .tab-pill {
      flex: 1;
      padding: 9px 6px;
      border-radius: 20px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      white-space: nowrap;
      text-align: center;
    }
    .tab-pill.active {
      background: #fff;
      color: #000;
      font-weight: 700;
    }

    /* ── Model Grid ── */
    .model-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px;
    }

    /* ── Model Card ── */
    .model-card {
      position: relative;
      border-radius: var(--radius-card);
      overflow: hidden;
      aspect-ratio: 3 / 4;
      cursor: pointer;
      background: var(--surface2);
      transition: transform 0.14s ease;
      -webkit-user-select: none;
      user-select: none;
    }
    .model-card:active { transform: scale(0.97); }
    .model-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .model-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.78) 0%,
        rgba(0,0,0,0.15) 50%,
        transparent 100%
      );
    }
    .model-card-info {
      position: absolute;
      bottom: 11px;
      left: 11px;
      right: 11px;
    }
    .model-card-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    }
    .model-card-handle {
      font-size: 11px;
      color: rgba(255,255,255,0.65);
      margin-top: 2px;
    }

    /* ── Skeleton ── */
    .skeleton {
      border-radius: var(--radius-card);
      aspect-ratio: 3 / 4;
      background: var(--surface2);
      overflow: hidden;
      position: relative;
    }
    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.04) 50%,
        transparent 100%
      );
      animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%);  }
    }

    /* ── Empty State ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 20px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 44px; margin-bottom: 14px; }
    .empty-text { font-size: 15px; }

    /* ═══════════════════════════════════════════════
       PROFILE VIEW
    ══════════════════════════════════════════════════ */

    /* ── Top bar ── */
    .profile-topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 16px 10px;
      position: relative;
    }
    .profile-topbar-title {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 1.5px;
      color: #fff;
    }
    .back-btn {
      position: absolute;
      left: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface);
      border: none;
      color: var(--text);
      font-size: 19px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .back-btn:active { background: rgba(255,255,255,0.12); }

    /* ── Profile header: avatar left, info right ── */
    .profile-header {
      display: flex;
      align-items: flex-start;
      padding: 20px 24px 0;
      gap: 18px;
    }
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }
    .profile-info {
      flex: 1;
      min-width: 0;
      padding-top: 4px;
    }
    .profile-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .profile-name {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    .verified-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--blue);
      flex-shrink: 0;
    }
    .verified-badge svg {
      width: 11px;
      height: 11px;
      fill: #fff;
    }
    .profile-username {
      display: block;
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .profile-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .btn-primary, .btn-outline {
      padding: 9px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.14s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      border: none;
      background: #fff;
      color: #000;
    }
    .btn-primary:active { opacity: 0.8; }
    .btn-outline {
      border: none;
      background: var(--surface);
      color: #fff;
    }
    .btn-outline:active { opacity: 0.7; }

    /* ── 3-column photo grid ── */
    .photos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 20px 16px 40px;
    }
    .photo-item {
      aspect-ratio: 1;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface2);
      transition: opacity 0.15s;
    }
    .photo-item:active { opacity: 0.85; }
    .photo-item img,
    .photo-item video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }
    .photo-item .video-badge {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0,0,0,0.55);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      z-index: 2;
      pointer-events: none;
    }
    .photo-item video { z-index: 1; }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      padding: 56px 0 32px;
      overflow: hidden;
    }
    #lightbox.open { display: flex; }
    #lightbox-img {
      max-width: 100%;
      max-height: calc(100vh - 150px);
      width: auto;
      height: auto;
      object-fit: contain;
      flex-shrink: 1;
      pointer-events: none;
      will-change: transform, opacity;
    }
    @keyframes lbSlideLeft {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes lbSlideRight {
      from { transform: translateX(-40px); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }
    .lb-anim-left  { animation: lbSlideLeft  0.22s ease forwards; }
    .lb-anim-right { animation: lbSlideRight 0.22s ease forwards; }
    #lightbox-dots {
      display: flex;
      gap: 6px;
      margin-top: 16px;
      align-items: center;
      justify-content: center;
      min-height: 10px;
      flex-shrink: 0;
    }
    .lb-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      transition: background 0.18s, transform 0.18s;
      flex-shrink: 0;
    }
    .lb-dot.active {
      background: #fff;
      transform: scale(1.4);
    }
    #lightbox-counter {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      font-weight: 500;
    }
    #lightbox-msg {
      margin-top: 16px;
      padding: 9px 28px;
      border-radius: 20px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.14s;
      flex-shrink: 0;
    }
    #lightbox-msg:active { background: rgba(255,255,255,0.25); }
    #lightbox-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      border: none;
      color: #fff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font);
    }
    .no-photos {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      padding: 20px 0;
    }

    /* ── Loading dots ── */
    .profile-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 64px 0;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #fff;
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.75); }
      40%            { opacity: 1;    transform: scale(1.15); }
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      color: var(--text);
      padding: 10px 22px;
      border-radius: 22px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.09);
      white-space: nowrap;
      z-index: 9999;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ── Fade-in ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    .fade-up {
      animation: fadeUp 0.22s ease forwards;
    }
  </style>
</head>

<body>

<!-- ═══════════════════════════════════════════════
     GRID VIEW
═════════════════════════════════════════════════ -->
<div id="grid-view">

  <header class="header">
    <div class="header-logo">TeleDiscover</div>
  </header>

  <nav class="tab-bar" id="tab-bar">
    <button class="tab-pill active" data-tab="trending">🔥 Trending</button>
    <button class="tab-pill"        data-tab="popular">💎 Popular</button>
    <button class="tab-pill"        data-tab="new">✨ New</button>
  </nav>

  <div class="model-grid" id="grid-container">
  </div>

</div>

<!-- ═══════════════════════════════════════════════
     PROFILE VIEW
═════════════════════════════════════════════════ -->
<div id="profile-view">

  <div class="profile-topbar">
    <button class="back-btn" id="back-btn" aria-label="Back">←</button>
    <span class="profile-topbar-title">TeleDiscover</span>
  </div>

  <div class="profile-content" id="profile-content">
  </div>

</div>

<!-- ═══════════════════════════════════════════════
     TOAST
═════════════════════════════════════════════════ -->
<div id="toast" role="status" aria-live="polite"></div>

<!-- ═══════════════════════════════════════════════
     LIGHTBOX
═════════════════════════════════════════════════ -->
  <div id="lightbox">
    <button id="lightbox-close" aria-label="Close">✕</button>
    <img id="lightbox-img" src="" alt="photo" />
    <video id="lightbox-video" src="" controls preload="metadata" style="display:none;max-width:100%;max-height:calc(100vh - 150px)"></video>
    <div id="lightbox-dots"></div>
    <button id="lightbox-msg">Message</button>
  </div>

<!-- ═══════════════════════════════════════════════
     APP SCRIPT
═════════════════════════════════════════════════ -->
<script>
'use strict';

const API_BASE = 'https://onlydate-api.tg-saas.workers.dev';

const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  if (typeof tg.setHeaderColor     === 'function') tg.setHeaderColor('#0f1115');
  if (typeof tg.setBackgroundColor === 'function') tg.setBackgroundColor('#0f1115');
}

const cache = { trending: null, popular: null, new: null };
let currentTab     = 'trending';
let currentProfile = null;
let toastTimer     = null;

const $gridView      = document.getElementById('grid-view');
const $profileView   = document.getElementById('profile-view');
const $gridContainer = document.getElementById('grid-container');
const $profileContent= document.getElementById('profile-content');
const $tabBar        = document.getElementById('tab-bar');
const $backBtn       = document.getElementById('back-btn');
const $toast         = document.getElementById('toast');

function init() {
  renderSkeletons();
  attachTabEvents();
  attachGridEvents();
  $backBtn.addEventListener('click', showGrid);

  if (tg && tg.BackButton) {
    tg.BackButton.onClick(function () {
      if ($profileView.style.display !== 'none') showGrid();
    });
  }

  Promise.all([
    fetchModels('trending'),
    fetchModels('popular'),
    fetchModels('new'),
  ]).then(function (results) {
    cache.trending = results[0];
    cache.popular  = results[1];
    cache.new      = results[2];
    renderGrid(currentTab);
  });
}

async function fetchModels(tab) {
  try {
    const res = await fetch(API_BASE + '/api/onlydate/models?tab=' + encodeURIComponent(tab));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    return Array.isArray(data.models) ? data.models : [];
  } catch (e) {
    console.error('[App] fetchModels(' + tab + '):', e);
    return [];
  }
}

async function fetchProfile(username) {
  const res = await fetch(API_BASE + '/api/onlydate/models/' + encodeURIComponent(username));
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

function renderSkeletons() {
  $gridContainer.innerHTML = Array.from({ length: 8 })
    .map(function () { return '<div class="skeleton"></div>'; })
    .join('');
}

function renderGrid(tab) {
  const models = cache[tab];
  if (!models) { renderSkeletons(); return; }

  if (models.length === 0) {
    $gridContainer.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">💔</div>' +
        '<div class="empty-text">No models found</div>' +
      '</div>';
    return;
  }

  $gridContainer.innerHTML = models.map(function (m, i) {
    const name    = escHtml(m.name     || '');
    const handle  = escHtml(m.username || '');
    const imgSrc  = escHtml(m.cover_photo || '');
    const delay   = Math.min(i * 30, 300);

    return (
      '<div class="model-card fade-up" data-username="' + handle + '" ' +
          'style="animation-delay:' + delay + 'ms">' +
        '<img class="model-card-img" src="' + imgSrc + '" ' +
            'loading="lazy" alt="' + name + '" ' +
            'onerror="this.style.opacity=\'0\'">' +
        '<div class="model-card-overlay"></div>' +
        '<div class="model-card-info">' +
          '<div class="model-card-name">'   + name   + '</div>' +
          '<div class="model-card-handle">@' + handle.replace(/^@/, '') + '</div>' +
        '</div>' +
      '</div>'
    );
  }).join('');
}

function attachTabEvents() {
  $tabBar.addEventListener('click', function (e) {
    var pill = e.target.closest('.tab-pill');
    if (!pill) return;
    var tab = pill.dataset.tab;
    if (tab === currentTab) return;
    currentTab = tab;

    $tabBar.querySelectorAll('.tab-pill').forEach(function (p) {
      p.classList.toggle('active', p.dataset.tab === tab);
    });

    renderGrid(tab);
  });
}

function attachGridEvents() {
  $gridContainer.addEventListener('click', function (e) {
    var card = e.target.closest('.model-card');
    if (card && card.dataset.username) openProfile(card.dataset.username);
  });
}

async function openProfile(username) {
  $gridView.style.display    = 'none';
  $profileView.style.display = 'block';
  window.scrollTo(0, 0);

  if (tg && tg.BackButton) tg.BackButton.show();

  $profileContent.innerHTML =
    '<div class="profile-loading">' +
      '<div class="dot"></div>' +
      '<div class="dot"></div>' +
      '<div class="dot"></div>' +
    '</div>';

  try {
    const profile = await fetchProfile(username);
    currentProfile = profile;
    renderProfile(profile);
  } catch (e) {
    console.error('[App] fetchProfile error:', e);
    $profileContent.innerHTML =
      '<div class="empty-state" style="padding-top:80px">' +
        '<div class="empty-icon">⚠️</div>' +
        '<div class="empty-text">Could not load profile</div>' +
      '</div>';
  }
}

function renderProfile(p) {
  const name     = escHtml(p.name     || 'Unknown');
  const username = escHtml(p.username || '');
  const avatar   = escHtml(p.cover_photo || '');
  const handle   = username.replace(/^@/, '');

  var photosHtml = '';
  if (p.free_photos && p.free_photos.length > 0) {
    photosHtml = p.free_photos.map(function (url, i) {
      var delay = Math.min(i * 50, 500);
      var isVideo = /\.(mp4|webm|mov)(\?|$)/i.test(url);
      if (isVideo) {
        return (
          '<div class="photo-item fade-up" style="animation-delay:' + delay + 'ms" ' +
              'data-photo-index="' + i + '">' +
            '<video src="' + escHtml(url) + '" autoplay loop muted playsinline preload="auto"' +
            ' onerror="this.style.display=\'none\'"></video>' +
            '<div class="video-badge">▶</div>' +
          '</div>'
        );
      }
      return (
        '<div class="photo-item fade-up" style="animation-delay:' + delay + 'ms" ' +
            'data-photo-index="' + i + '">' +
          '<img src="' + escHtml(url) + '" loading="lazy" alt="photo">' +
        '</div>'
      );
    }).join('');
  } else {
    photosHtml = '<p class="no-photos">No photos available</p>';
  }

  $profileContent.innerHTML =
    '<div class="profile-header fade-up">' +
      '<img class="profile-avatar" src="' + avatar + '" alt="' + name + '" ' +
          'onerror="this.style.opacity=\'0\'">' +
      '<div class="profile-info">' +
        '<div class="profile-name-row">' +
          '<span class="profile-name">' + name + '</span>' +
          '<span class="verified-badge"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>' +
        '</div>' +
        '<a class="profile-username" href="https://t.me/' + handle + '">@' + handle + '</a>' +
        '<div class="profile-actions">' +
          '<button class="btn-primary" id="btn-msg">💬 Message</button>' +
          '<button class="btn-outline" id="btn-share">↗ Share</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="photos-grid fade-up" id="photos-grid">' +
      photosHtml +
    '</div>';

  document.getElementById('btn-msg').addEventListener('click', onMessageClick);
  document.getElementById('btn-share').addEventListener('click', onShareClick);

  var grid = document.getElementById('photos-grid');
  if (grid) {
    // Autoplay videos when scrolled into view
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          var v = entry.target.querySelector('video');
          if (v) v.play().catch(function () {});
        }
      });
    }, { threshold: 0.5 });
    grid.querySelectorAll('.photo-item').forEach(function (item) {
      var v = item.querySelector('video');
      if (v) observer.observe(item);
    });

    grid.addEventListener('click', function (e) {
      var item = e.target.closest('.photo-item');
      if (!item) return;
      var idx = parseInt(item.dataset.photoIndex, 10);
      if (!isNaN(idx) && p.free_photos && p.free_photos.length > 0) {
        openLightbox(p.free_photos, idx);
      }
    });
  }
}

function showGrid() {
  $profileView.style.display = 'none';
  $gridView.style.display    = 'block';
  currentProfile = null;
  window.scrollTo(0, 0);

  if (tg && tg.BackButton) tg.BackButton.hide();
}

function onMessageClick() {
  if (!currentProfile || !currentProfile.username) return;
  var url = 'https://t.me/' + encodeURIComponent(currentProfile.username);
  if (tg && tg.openTelegramLink) {
    tg.openTelegramLink(url);
  } else {
    window.open(url, '_blank');
  }
}

function onShareClick() {
  if (!currentProfile || !currentProfile.username) return;
  var text = '@' + currentProfile.username.replace(/^@/, '');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(function () { showToast('Copied! ✓'); })
      .catch(function () { showToast(text); });
  } else {
    showToast(text);
  }
}

function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () {
    $toast.classList.remove('show');
  }, 2200);
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#039;');
}

/* ── Lightbox ── */
var $lightbox      = document.getElementById('lightbox');
var $lightboxImg   = document.getElementById('lightbox-img');
var $lightboxVideo = document.getElementById('lightbox-video');
var $lightboxMsg   = document.getElementById('lightbox-msg');
var $lightboxClose = document.getElementById('lightbox-close');
var $lightboxDots  = document.getElementById('lightbox-dots');

var _lbPhotos = [];
var _lbIndex  = 0;
var _lbTouchX = 0;
var _lbTouchY = 0;

function openLightbox(photos, index) {
  _lbPhotos = photos;
  _lbIndex  = index;
  $lightbox.classList.add('open');
  _showLbPhoto(index, null);
}

function closeLightbox() {
  $lightbox.classList.remove('open');
  $lightboxImg.src = '';
  $lightboxImg.style.display = '';
  $lightboxImg.className = '';
  if ($lightboxVideo) {
    $lightboxVideo.src = '';
    $lightboxVideo.style.display = 'none';
    $lightboxVideo.pause();
  }
  $lightboxDots.innerHTML = '';
  _lbPhotos = [];
  _lbIndex  = 0;
}

function _showLbPhoto(index, dir) {
  _lbIndex = index;
  var url = _lbPhotos[index];
  var isVideo = url && /\.(mp4|webm|mov)(\?|$)/i.test(url);

  if (isVideo) {
    $lightboxImg.style.display = 'none';
    $lightboxVideo.style.display = '';
    $lightboxVideo.src = url;
    $lightboxVideo.play().catch(function(){});
  } else {
    $lightboxVideo.pause();
    $lightboxVideo.style.display = 'none';
    $lightboxImg.style.display = '';
    $lightboxImg.className = '';
    if (dir) {
      void $lightboxImg.offsetWidth;
      $lightboxImg.classList.add(dir === 'next' ? 'lb-anim-left' : 'lb-anim-right');
    }
    $lightboxImg.src = url;
  }

  var count = _lbPhotos.length;
  if (count <= 1) {
    $lightboxDots.innerHTML = '';
  } else if (count <= 10) {
    $lightboxDots.innerHTML = _lbPhotos.map(function (_, i) {
      return '<div class="lb-dot' + (i === index ? ' active' : '') + '"></div>';
    }).join('');
  } else {
    $lightboxDots.innerHTML = '<span id="lightbox-counter">' + (index + 1) + ' / ' + count + '</span>';
  }
}

function _lbNext() {
  if (_lbPhotos.length < 2) return;
  _showLbPhoto((_lbIndex + 1) % _lbPhotos.length, 'next');
}

function _lbPrev() {
  if (_lbPhotos.length < 2) return;
  _showLbPhoto((_lbIndex - 1 + _lbPhotos.length) % _lbPhotos.length, 'prev');
}

$lightbox.addEventListener('touchstart', function (e) {
  _lbTouchX = e.touches[0].clientX;
  _lbTouchY = e.touches[0].clientY;
}, { passive: true });

$lightbox.addEventListener('touchend', function (e) {
  var dx = e.changedTouches[0].clientX - _lbTouchX;
  var dy = e.changedTouches[0].clientY - _lbTouchY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 44) {
    dx < 0 ? _lbNext() : _lbPrev();
  }
}, { passive: true });

$lightboxClose.addEventListener('click', closeLightbox);
$lightbox.addEventListener('click', function (e) {
  if (e.target === $lightbox) closeLightbox();
});
$lightboxMsg.addEventListener('click', function () {
  closeLightbox();
  onMessageClick();
});

init();
</script>
