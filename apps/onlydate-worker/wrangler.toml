name = "onlydate-api"
main = "src/index.ts"
compatibility_date = "2024-05-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT       = "production"
POSTHOG_API_KEY   = "phc_zprkyviP8t2JwCCMWQUPn3GwJmi6MtAXvApPkUBXtf6f"

# Secrets (set via CLI — not stored in this file):
